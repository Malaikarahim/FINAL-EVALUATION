<div class="dialog-backdrop" *ngIf="open">
  <div class="dialog card">
    <h3>{{ title }}</h3>
    <p>{{ message }}</p>
    <div class="dialog-actions">
      <button class="btn btn-outline btn-sm" (click)="cancelled.emit()">Cancel</button>
      <button class="btn btn-danger btn-sm" (click)="confirmed.emit()">{{ confirmLabel }}</button>
    </div>
  </div>
</div>
